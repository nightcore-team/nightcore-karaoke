repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.4
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --config=pyproject.toml ]
      files: ^src/

    # Run the formatter.
    - id: ruff-format
      args: [ --config=pyproject.toml ]
      files: ^src/

- repo: https://github.com/commitizen-tools/commitizen
  rev: v4.13.9
  hooks:
    - id: commitizen
      stages: [commit-msg]