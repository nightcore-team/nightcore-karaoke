name: python-boilerplate

networks:
  project-network:
    name: ${DOCKER_NETWORK_NAME}
    driver: bridge

services:
  bot:
    image: ${DOCKER_PROJECT_NAME}:${DOCKER_IMAGE_TAG}
    container_name: ${DOCKER_CONTAINER_NAME}
    build:
      context: .
      dockerfile: Dockerfile

    env_file:
      - .env

    develop:
      watch:
        # Sync the working directory with the `/app` directory in the container
        - action: sync
          path: .
          target: /app
          ignore:
            - app/.venv/

        # Rebuild the image on changes to the `pyproject.toml`
        - action: rebuild
          path: ./app/pyproject.toml

    ports:
      - "${DOCKER_PORT}:${DOCKER_PORT}"
    restart: on-failure

    volumes:
      - ./src/:/app/src/
    networks:
      - project-network

  nightcore-db:
    image: postgres:16-alpine
    container_name: nightcore-karaoke-db
    restart: no
    env_file:
      - .env

    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready --username=nightcore --dbname=nightcore" ]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - project-network
